<form [formGroup]="recipeForm" (ngSubmit)="onGenerate()" class="recipe-box">
  <div id="firstRow">
    <div id="prompt">
      <textarea
        formControlName="recipePrompt"
        id="recipePrompt"
        placeholder="Escribe ingredientes o una idea..."
      ></textarea>
    </div>

    <div class="button-container">
      <button type="submit" id="searchBtn" class="btn-search">
        <span>Generate</span>
      </button>
      <button type="button" id="resetBtn" class="btn-reset" (click)="onReset()">
        <span>Reset</span>
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="filters-row">
    <div class="filter-bubble">
      <span class="icon">👥</span>
      <input
        type="number"
        formControlName="servings"
        id="servings"
        placeholder="Personas"
      />
    </div>

    <div class="filter-bubble">
      <span class="icon">⏱️</span>
      <input
        type="number"
        formControlName="maxDuration"
        id="maxDuration"
        placeholder="Minutos"
      />
    </div>

    <div class="filter-bubble">
      <select formControlName="mealType" id="mealTypes">
        <option value="">Cualquier momento</option>
        <option value="breakfast">Desayuno</option>
        <option value="lunch">Almuerzo</option>
        <option value="dinner">Cena</option>
      </select>
    </div>

    <div class="filter-bubble">
      <select formControlName="cuisineType" id="cuisineTypes">
        <option value="">Cualquier cocina</option>
        <option value="mediterranean">Mediterránea</option>
        <option value="asian">Asiática</option>
        <option value="mexican">Mexicana</option>
        <option value="italian">Italiana</option>
      </select>
    </div>

    <div
      class="filter-bubble multi-select"
      id="multiSelectToggle"
      (click)="toggleDropdown()"
    >
      <span class="icon">🥗</span>
      <span id="restrictionsLabel" class="restrictions-label"
        >Restricciones</span
      >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="arrow"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        [style.transform]="isDropdownOpen ? 'rotate(180deg)' : 'none'"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 9l-7 7-7-7"
        />
      </svg>

      <div
        class="dropdown-content"
        id="restrictionsDropdown"
        [class.show]="isDropdownOpen"
      >
        @for (restriction of restrictionsList; track restriction.value) {
          <label class="option-item">
            <input
              type="checkbox"
              [value]="restriction.value"
              [checked]="selectedRestrictions.includes(restriction.value)"
              (change)="onCheckboxChange($event, restriction.value)"
            />
            {{ restriction.name }}
          </label>
        }
      </div>
    </div>
  </div>
</form>
