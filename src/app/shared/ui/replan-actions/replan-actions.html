<div class="fab-group">
  <button
    class="fab fab--like"
    [class.fab--liked]="liked"
    (click)="toggleLike()"
    aria-label="Like recipe"
  >
    <svg
      class="fab__icon"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
        [attr.fill]="liked ? 'currentColor' : 'none'"
        stroke="currentColor"
        stroke-width="1.8"
      />
    </svg>
    @if (likeCount > 0) {
    <span class="fab__count">{{ likeCount }}</span>
    }
  </button>

  <button class="fab fab--chat" aria-label="Open comments">
    <svg
      class="fab__icon"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linejoin="round"
      />
    </svg>
  </button>
</div>
